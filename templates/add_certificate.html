<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Certificate | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            background-image: radial-gradient(#1e1b4b 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .form-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 14px 18px;
            border-radius: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #a855f7;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-6">

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] shadow-2xl">
        <div class="mb-10 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-600/20 rounded-2xl mb-6 border border-purple-500/30">
                <i class="fas fa-certificate text-2xl text-purple-400"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Add_<span class="text-purple-500">Certificate</span></h1>
            <p class="text-slate-500 text-sm mt-2">Validate your expertise.</p>
        </div>

        <form method="POST" class="space-y-8">
            {% csrf_token %}

            <div>
                <label for="title">Certificate Title</label>
                <input type="text" name="title" id="title" placeholder="e.g. Python for Data Science" required class="form-input">
            </div>

            <div>
                <label for="authority">Issuing Authority</label>
                <input type="text" name="authority" id="authority" placeholder="e.g. NPTEL or TCS iON" required class="form-input">
            </div>

            <div class="pt-4 flex flex-col gap-4">
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-purple-500/20 uppercase tracking-widest text-xs">
                    Verify_and_Save
                </button>
                <a href="/" class="text-center text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-white transition">
                    Back to Portfolio
                </a>
            </div>
        </form>
    </div>

</body>
</html>
