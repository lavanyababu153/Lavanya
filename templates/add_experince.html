<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Experience | Lavanya Babu Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            background-image: radial-gradient(#1e1b4b 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .form-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 14px 18px;
            border-radius: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #a855f7;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-6 py-12">

    <div class="max-w-xl w-full glass-panel p-10 md:p-12 rounded-[2.5rem]">
        <div class="mb-12 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-600/20 rounded-2xl mb-6 border border-purple-500/30">
                <i class="fas fa-briefcase text-2xl text-purple-400"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase">Add_<span class="text-purple-500">Experience</span></h1>
            <p class="text-slate-500 text-sm mt-2">Log your latest professional milestones.</p>
        </div>

        <form method="POST" class="space-y-8">
            {% csrf_token %}

            <div class="grid grid-cols-1 gap-8">
                <div>
                    <label for="role">Job Title / Role</label>
                    <input type="text" name="role" id="role" placeholder="e.g. Software Associate" required class="form-input">
                </div>

                <div>
                    <label for="company">Company Name</label>
                    <input type="text" name="company" id="company" placeholder="e.g. Regional Technologies" required class="form-input">
                </div>

                <div>
                    <label for="duration">Duration</label>
                    <input type="text" name="duration" id="duration" placeholder="e.g. Nov 2025 – Present" required class="form-input">
                </div>

                <div>
                    <label for="stack">Tech Stack</label>
                    <input type="text" name="stack" id="stack" placeholder="e.g. Flutter, Django, REST API" required class="form-input">
                    <p class="text-[10px] text-slate-500 mt-2 italic uppercase tracking-wider">Separate skills with commas</p>
                </div>
            </div>

            <div class="pt-6 flex flex-col sm:flex-row gap-4">
                <button type="submit" class="flex-1 btn-gradient text-white font-black py-4 rounded-2xl tracking-widest text-xs uppercase">
                    Save_Record
                </button>
                <a href="/" class="flex-1 border border-slate-700 bg-slate-800/30 hover:bg-slate-800 text-slate-400 font-black py-4 rounded-2xl text-center text-xs tracking-widest uppercase transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>

</body>
</html>
